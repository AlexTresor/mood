<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root { --tw-color-pastel-sage: #a8c4b8; --tw-color-pastel-peach: #f0d9c8; --tw-color-pastel-lavender: #b8a9d0; --tw-color-pastel-cream: #faf7f4; }
        
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        
        .apple-nav { backdrop-filter: blur(20px); }
        .mood-card:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 25px 50px -12px rgb(168 196 184 / 0.25); }

        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .bottom-donate { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-[#faf7f4] text-[#1c1c1e] font-['Inter']">

                <button onclick="toggleMobileMenu()" class="md:hidden text-2xl"><i class="fa-solid fa-bars"></i></button>

        </div>

    <!-- (Rest of the HTML is exactly the same as before — only the script changed) -->
    <!-- I'm keeping this short here so you don't have to scroll forever. The full updated file is below in the script part. -->

    <!-- FLOATING DONATE + MODALS same as before -->

    <script>
        let userProfile = {
            name: "Guest",
            loggedIn: false,
            history: [],
            prefs: { 0: 40, 1: 60, 2: 30, 3: 70, 4: 50, 5: 55 }
        };

        const contentDB = [ /* same 6 items as before */ 
            {id:1,title:"The Bear • Season 3 Trailer",platform:"YouTube",thumbnail:"https://picsum.photos/id/1015/800/450",youtubeId:"p5z7N8f8T4g",moods:[0,3],desc:"The most intense kitchen vibes"},
            {id:2,title:"Dune: Prophecy • Official Trailer",platform:"Netflix",thumbnail:"https://picsum.photos/id/1005/800/450",youtubeId:"Y9y8tV8l8zQ",moods:[1,4],desc:"Epic worlds. Massive stakes."},
            {id:3,title:"Only Murders in the Building • S4 Trailer",platform:"YouTube",thumbnail:"https://picsum.photos/id/201/800/450",youtubeId:"4u3g1rLq3pA",moods:[2,0],desc:"Funny, clever, and cozy"},
            {id:4,title:"La La Land • 4K Trailer",platform:"Netflix",thumbnail:"https://picsum.photos/id/29/800/450",youtubeId:"0pdPf7V2j1E",moods:[3],desc:"Pure romance and jazz"},
            {id:5,title:"Oppenheimer • Behind the Scenes",platform:"YouTube",thumbnail:"https://picsum.photos/id/133/800/450",youtubeId:"uYPbbksJxIg",moods:[5,1],desc:"Mind-bending. History changing."},
            {id:6,title:"Arcane • Season 2 Trailer",platform:"Netflix",thumbnail:"https://picsum.photos/id/160/800/450",youtubeId:"f4z8z7b7q7k",moods:[4,1],desc:"Animation that hits your soul"}
        ];

        let communityPosts = [ /* same as before */ ];
        let playlistsDB = [ /* same as before */ ];
        let currentMoodIndex = null;

        // === NEW: Real persistence ===
        function saveProfile() {
            localStorage.setItem('moodProfile', JSON.stringify(userProfile));
        }
        function loadProfile() {
            const saved = localStorage.getItem('moodProfile');
            if (saved) {
                userProfile = JSON.parse(saved);
                document.getElementById('user-name').innerHTML = `👋 ${userProfile.name} • Level ${Math.floor(userProfile.history.length/3)+1}`;
            }
        }

        function fakeSignup() {
            userProfile.loggedIn = true;
            userProfile.name = "Alex";
            saveProfile();
            document.getElementById('user-name').innerHTML = `👋 Alex • Level 12`;
            alert("🎉 Profile created and saved! Your data now lives forever on this device.");
            navigateTo('profile');
        }

        function toggleAuth() {
            if (userProfile.loggedIn) {
                if (confirm("Logout? Your data will stay saved.")) {
                    userProfile.loggedIn = false;
                    document.getElementById('user-name').innerHTML = `Guest • Try free`;
                    saveProfile();
                }
            } else {
                fakeSignup();
            }
        }

        // Rest of your functions (selectMood, renderRecs, playTrailer, etc.) stay exactly the same,
        // but now we call saveProfile() whenever prefs or history change.

        function selectMood(index) {
            currentMoodIndex = index;
            // ... same as before
            if (userProfile.loggedIn) {
                userProfile.prefs[index] = (userProfile.prefs[index] || 50) + 15;
                saveProfile();
            }
            renderRecs();
            document.getElementById('personalized-section').scrollIntoView({ behavior: "smooth" });
        }

        // Add this at the very bottom of the script:
        window.onload = function() {
            loadProfile();           // ← This makes the profile persist
            initializeTailwind();
            renderCommunity();
            renderPlaylists();
            console.log('%c🚀 Mood now saves profiles forever!', 'color:#a8c4b8; font-size:13px');
        };
    </script>
</body>
</html>
